name: Deploy

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      skip_package:
        description: 'Skip Lambda packaging (use existing S3 artifacts)'
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # Never cancel an in-flight deployment

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.11"

jobs:
  # ─── Determine target environment ─────────────────────────────────────────
  resolve-env:
    name: Resolve Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      bucket: ${{ steps.resolve.outputs.bucket }}
    steps:
      - name: Resolve target environment
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            ENV="staging"
          else
            # push to main → dev
            ENV="dev"
          fi
          echo "environment=${ENV}" >> "$GITHUB_OUTPUT"
          echo "bucket=advisory-deployments-${ENV}" >> "$GITHUB_OUTPUT"
          echo "Resolved environment: ${ENV}"

  # ─── Run tests before deploying ───────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: resolve-env
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/unit/ -q --tb=short

      - name: Run property tests
        env:
          HYPOTHESIS_MAX_EXAMPLES: "50"
        run: pytest tests/property/ -q --tb=short

  # ─── Deploy to dev (push to main) ─────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [resolve-env, test]
    if: needs.resolve-env.outputs.environment == 'dev'
    environment:
      name: dev
      url: ${{ steps.get-url.outputs.api_url }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy
        run: |
          SKIP_FLAG=""
          if [ "${{ github.event.inputs.skip_package }}" = "true" ]; then
            SKIP_FLAG="--skip-package"
          fi
          bash scripts/deploy.sh \
            --env dev \
            --bucket ${{ needs.resolve-env.outputs.bucket }} \
            --region ${{ env.AWS_REGION }} \
            ${SKIP_FLAG}

      - name: Get API URL
        id: get-url
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name advisory-dev-api \
            --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
            --output text)
          echo "api_url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Run smoke tests
        run: |
          bash scripts/smoke_tests.sh \
            --env dev \
            --api-endpoint ${{ steps.get-url.outputs.api_url }}

  # ─── Deploy to staging (on release tag) ───────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [resolve-env, test]
    if: needs.resolve-env.outputs.environment == 'staging'
    environment:
      name: staging
      url: ${{ steps.get-url.outputs.api_url }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy
        run: |
          bash scripts/deploy.sh \
            --env staging \
            --bucket ${{ needs.resolve-env.outputs.bucket }} \
            --region ${{ env.AWS_REGION }}

      - name: Get API URL
        id: get-url
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name advisory-staging-api \
            --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
            --output text)
          echo "api_url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Run smoke tests
        run: |
          bash scripts/smoke_tests.sh \
            --env staging \
            --api-endpoint ${{ steps.get-url.outputs.api_url }}

  # ─── Deploy to prod (manual approval required) ────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [resolve-env, test, deploy-staging]
    if: needs.resolve-env.outputs.environment == 'prod' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
    environment:
      name: prod          # GitHub environment with required reviewers configured
      url: ${{ steps.get-url.outputs.api_url }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy
        run: |
          bash scripts/deploy.sh \
            --env prod \
            --bucket ${{ needs.resolve-env.outputs.bucket }} \
            --region ${{ env.AWS_REGION }}

      - name: Get API URL
        id: get-url
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name advisory-prod-api \
            --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
            --output text)
          echo "api_url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Run smoke tests
        run: |
          bash scripts/smoke_tests.sh \
            --env prod \
            --api-endpoint ${{ steps.get-url.outputs.api_url }}

  # ─── Notify on failure ────────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-staging, deploy-prod]
    if: failure()
    steps:
      - name: Post failure summary
        run: |
          echo "::error::Deployment failed for ${{ github.ref }} - check logs above"
          echo "To rollback: bash scripts/rollback.sh --env <env>"
