name: Integration Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack:3.0
        ports:
          - 4566:4566
        env:
          SERVICES: dynamodb,s3,lambda,stepfunctions,sns,sqs,events
          DEBUG: "0"
          LAMBDA_EXECUTOR: local
        options: >-
          --health-cmd "curl -s http://localhost:4566/_localstack/health | grep -q '\"dynamodb\": \"running\"'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-timeout

      - name: Wait for LocalStack to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:4566/_localstack/health | grep -q '"dynamodb": "running"'; then
              echo "LocalStack is ready"
              break
            fi
            echo "Waiting for LocalStack... ($i/30)"
            sleep 2
          done

      - name: Bootstrap LocalStack resources
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:4566
        run: |
          aws dynamodb create-table \
            --table-name Portfolios \
            --attribute-definitions AttributeName=user_id,AttributeType=S AttributeName=portfolio_id,AttributeType=S \
            --key-schema AttributeName=user_id,KeyType=HASH AttributeName=portfolio_id,KeyType=RANGE \
            --billing-mode PAY_PER_REQUEST \
            --endpoint-url http://localhost:4566 || true

          aws dynamodb create-table \
            --table-name Transactions \
            --attribute-definitions AttributeName=user_id,AttributeType=S AttributeName=timestamp,AttributeType=S \
            --key-schema AttributeName=user_id,KeyType=HASH AttributeName=timestamp,KeyType=RANGE \
            --billing-mode PAY_PER_REQUEST \
            --endpoint-url http://localhost:4566 || true

          aws dynamodb create-table \
            --table-name AgentSessions \
            --attribute-definitions AttributeName=session_id,AttributeType=S \
            --key-schema AttributeName=session_id,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --endpoint-url http://localhost:4566 || true

          aws dynamodb create-table \
            --table-name MarketDataCache \
            --attribute-definitions AttributeName=data_key,AttributeType=S \
            --key-schema AttributeName=data_key,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --endpoint-url http://localhost:4566 || true

          # Create SNS topic for notifications
          aws sns create-topic \
            --name portfolio-alerts \
            --endpoint-url http://localhost:4566 || true

          # Create S3 bucket for reports
          aws s3 mb s3://portfolio-reports-test \
            --endpoint-url http://localhost:4566 || true

      - name: Run integration tests
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:4566
          DYNAMODB_TABLE_PORTFOLIOS: Portfolios
          DYNAMODB_TABLE_TRANSACTIONS: Transactions
          DYNAMODB_TABLE_SESSIONS: AgentSessions
          DYNAMODB_TABLE_MARKET_CACHE: MarketDataCache
          LOCALSTACK_ENDPOINT: http://localhost:4566
          SNS_TOPIC_ARN: arn:aws:sns:us-east-1:000000000000:portfolio-alerts
          S3_REPORTS_BUCKET: portfolio-reports-test
        run: |
          pytest tests/integration/ \
            --cov=src \
            --cov=lambda \
            --cov-report=xml:coverage-integration.xml \
            --cov-report=term-missing \
            --junitxml=test-results/integration-tests.xml \
            --timeout=120 \
            -v \
            --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage-integration.xml
          flags: integration-tests
          name: integration-test-coverage
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: test-results/integration-tests.xml
          retention-days: 14

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/integration-tests.xml
          check_name: Integration Test Results
