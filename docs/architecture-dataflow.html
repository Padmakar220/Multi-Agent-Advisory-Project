<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multi-Agent Advisory AI – Data Flow</title>
<style>
  body { font-family: "Amazon Ember", Arial, sans-serif; background: #f8f8f8; display: flex; flex-direction: column; align-items: center; padding: 32px; }
  h2 { color: #232f3e; font-size: 20px; margin-bottom: 4px; }
  p.sub { color: #555; font-size: 13px; margin-bottom: 24px; }
  svg { background: #fff; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
</style>
</head>
<body>
<h2>Multi-Agent Advisory AI System – Data Flow</h2>
<p class="sub">AWS Serverless Architecture · LangGraph Supervisor · Amazon Bedrock</p>

<svg width="960" height="620" viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrow marker -->
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1a73e8"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e8711a"/>
    </marker>
  </defs>

  <!-- ── Zone backgrounds ── -->
  <!-- Client Zone -->
  <rect x="20" y="20" width="140" height="580" rx="10" fill="#fef9f0" stroke="#f0a500" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="90" y="42" text-anchor="middle" font-size="11" fill="#b07000" font-weight="bold">CLIENT</text>

  <!-- AWS Cloud Zone -->
  <rect x="180" y="20" width="760" height="580" rx="10" fill="#f0f4ff" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="560" y="42" text-anchor="middle" font-size="11" fill="#1a4db0" font-weight="bold">AWS CLOUD</text>

  <!-- AI Agents sub-zone -->
  <rect x="390" y="200" width="380" height="200" rx="8" fill="#e8f4e8" stroke="#2e7d32" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="580" y="218" text-anchor="middle" font-size="10" fill="#2e7d32" font-weight="bold">SPECIALIZED AGENTS (Lambda)</text>

  <!-- Data Layer sub-zone -->
  <rect x="390" y="430" width="380" height="150" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="580" y="448" text-anchor="middle" font-size="10" fill="#e65100" font-weight="bold">DATA LAYER</text>

  <!-- ── Boxes ── -->
  <!-- Helper macro: rounded rect + icon area + label -->

  <!-- 1. Client App -->
  <rect x="30" y="80" width="120" height="60" rx="6" fill="#fff8e1" stroke="#f0a500" stroke-width="1.5"/>
  <text x="90" y="106" text-anchor="middle" font-size="12" font-weight="bold" fill="#232f3e">Client App</text>
  <text x="90" y="122" text-anchor="middle" font-size="10" fill="#555">Web / Mobile</text>

  <!-- 2. Cognito -->
  <rect x="200" y="80" width="120" height="60" rx="6" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="260" y="106" text-anchor="middle" font-size="12" font-weight="bold" fill="#232f3e">Cognito</text>
  <text x="260" y="122" text-anchor="middle" font-size="10" fill="#555">Auth / JWT</text>

  <!-- 3. API Gateway -->
  <rect x="360" y="80" width="130" height="60" rx="6" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="425" y="106" text-anchor="middle" font-size="12" font-weight="bold" fill="#232f3e">API Gateway</text>
  <text x="425" y="122" text-anchor="middle" font-size="10" fill="#555">REST / WebSocket</text>

  <!-- 4. Step Functions -->
  <rect x="540" y="80" width="140" height="60" rx="6" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="610" y="106" text-anchor="middle" font-size="12" font-weight="bold" fill="#232f3e">Step Functions</text>
  <text x="610" y="122" text-anchor="middle" font-size="10" fill="#555">Workflow Orchestration</text>

  <!-- 5. Supervisor Agent -->
  <rect x="390" y="130" width="160" height="60" rx="6" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="470" y="156" text-anchor="middle" font-size="12" font-weight="bold" fill="#1b5e20">Supervisor Agent</text>
  <text x="470" y="172" text-anchor="middle" font-size="10" fill="#2e7d32">LangGraph + Bedrock</text>

  <!-- 6. Portfolio Analyzer -->
  <rect x="400" y="230" width="130" height="50" rx="6" fill="#fff" stroke="#2e7d32" stroke-width="1.2"/>
  <text x="465" y="252" text-anchor="middle" font-size="11" font-weight="bold" fill="#232f3e">Portfolio</text>
  <text x="465" y="268" text-anchor="middle" font-size="11" font-weight="bold" fill="#232f3e">Analyzer</text>

  <!-- 7. Tax Optimizer -->
  <rect x="550" y="230" width="110" height="50" rx="6" fill="#fff" stroke="#2e7d32" stroke-width="1.2"/>
  <text x="605" y="252" text-anchor="middle" font-size="11" font-weight="bold" fill="#232f3e">Tax</text>
  <text x="605" y="268" text-anchor="middle" font-size="11" font-weight="bold" fill="#232f3e">Optimizer</text>

  <!-- 8. Rebalancing Agent -->
  <rect x="675" y="230" width="80" height="50" rx="6" fill="#fff" stroke="#2e7d32" stroke-width="1.2"/>
  <text x="715" y="252" text-anchor="middle" font-size="11" font-weight="bold" fill="#232f3e">Rebalancing</text>
  <text x="715" y="268" text-anchor="middle" font-size="11" font-weight="bold" fill="#232f3e">Agent</text>

  <!-- 9. Human Approval -->
  <rect x="760" y="130" width="130" height="60" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="825" y="156" text-anchor="middle" font-size="12" font-weight="bold" fill="#b71c1c">Human</text>
  <text x="825" y="172" text-anchor="middle" font-size="10" fill="#c62828">Approval (SNS)</text>

  <!-- 10. Trade Executor -->
  <rect x="760" y="310" width="130" height="50" rx="6" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="825" y="332" text-anchor="middle" font-size="12" font-weight="bold" fill="#232f3e">Trade Executor</text>
  <text x="825" y="348" text-anchor="middle" font-size="10" fill="#555">Lambda</text>

  <!-- 11. DynamoDB -->
  <rect x="400" y="460" width="110" height="50" rx="6" fill="#fff8e1" stroke="#e65100" stroke-width="1.2"/>
  <text x="455" y="482" text-anchor="middle" font-size="11" font-weight="bold" fill="#232f3e">DynamoDB</text>
  <text x="455" y="498" text-anchor="middle" font-size="10" fill="#555">Portfolio State</text>

  <!-- 12. OpenSearch -->
  <rect x="530" y="460" width="110" height="50" rx="6" fill="#fff8e1" stroke="#e65100" stroke-width="1.2"/>
  <text x="585" y="482" text-anchor="middle" font-size="11" font-weight="bold" fill="#232f3e">OpenSearch</text>
  <text x="585" y="498" text-anchor="middle" font-size="10" fill="#555">Vector / RAG</text>

  <!-- 13. Market Data -->
  <rect x="660" y="460" width="100" height="50" rx="6" fill="#fff8e1" stroke="#e65100" stroke-width="1.2"/>
  <text x="710" y="482" text-anchor="middle" font-size="11" font-weight="bold" fill="#232f3e">Market Data</text>
  <text x="710" y="498" text-anchor="middle" font-size="10" fill="#555">S3 / EventBridge</text>

  <!-- 14. CloudWatch -->
  <rect x="200" y="460" width="120" height="50" rx="6" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
  <text x="260" y="482" text-anchor="middle" font-size="12" font-weight="bold" fill="#232f3e">CloudWatch</text>
  <text x="260" y="498" text-anchor="middle" font-size="10" fill="#555">Logs / Metrics</text>

  <!-- ── Arrows ── -->

  <!-- Client → Cognito -->
  <line x1="150" y1="110" x2="198" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="174" y="105" text-anchor="middle" font-size="9" fill="#555">Auth</text>

  <!-- Cognito → API Gateway -->
  <line x1="320" y1="110" x2="358" y2="110" stroke="#1a73e8" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="339" y="105" text-anchor="middle" font-size="9" fill="#1a73e8">Token</text>

  <!-- API Gateway → Step Functions -->
  <line x1="490" y1="110" x2="538" y2="110" stroke="#1a73e8" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="514" y="105" text-anchor="middle" font-size="9" fill="#1a73e8">Trigger</text>

  <!-- Step Functions → Supervisor Agent -->
  <line x1="610" y1="140" x2="552" y2="155" stroke="#1a73e8" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Supervisor → Portfolio Analyzer -->
  <line x1="450" y1="190" x2="450" y2="228" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Supervisor → Tax Optimizer -->
  <line x1="490" y1="190" x2="580" y2="228" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Supervisor → Rebalancing -->
  <line x1="530" y1="190" x2="700" y2="228" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Supervisor → Human Approval -->
  <line x1="550" y1="155" x2="758" y2="155" stroke="#c62828" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="660" y="148" text-anchor="middle" font-size="9" fill="#c62828">Approval Request</text>

  <!-- Human Approval → Trade Executor -->
  <line x1="825" y1="190" x2="825" y2="308" stroke="#c62828" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="855" y="255" font-size="9" fill="#c62828">Approved</text>

  <!-- Rebalancing → Trade Executor -->
  <line x1="755" y1="260" x2="790" y2="320" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Agents → DynamoDB -->
  <line x1="455" y1="280" x2="455" y2="458" stroke="#e65100" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-orange)"/>

  <!-- Agents → OpenSearch -->
  <line x1="580" y1="280" x2="580" y2="458" stroke="#e65100" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-orange)"/>

  <!-- Market Data → Agents (upward) -->
  <line x1="710" y1="458" x2="710" y2="282" stroke="#e65100" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-orange)"/>

  <!-- Trade Executor → DynamoDB -->
  <line x1="790" y1="345" x2="515" y2="480" stroke="#1a73e8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-blue)"/>
  <text x="660" y="400" text-anchor="middle" font-size="9" fill="#1a73e8">Update State</text>

  <!-- CloudWatch (monitoring all) -->
  <line x1="260" y1="458" x2="260" y2="200" stroke="#1a73e8" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="260" y1="200" x2="388" y2="160" stroke="#1a73e8" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr-blue)"/>
  <text x="220" y="320" font-size="9" fill="#1a73e8" transform="rotate(-90,220,320)">Observability</text>

  <!-- ── Legend ── -->
  <rect x="200" y="555" width="740" height="40" rx="6" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
  <line x1="220" y1="575" x2="255" y2="575" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="260" y="579" font-size="10" fill="#333">Request / Response</text>
  <line x1="340" y1="575" x2="375" y2="575" stroke="#c62828" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="380" y="579" font-size="10" fill="#333">Human Approval</text>
  <line x1="470" y1="575" x2="505" y2="575" stroke="#e65100" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-orange)"/>
  <text x="510" y="579" font-size="10" fill="#333">Data Read / Write</text>
  <line x1="610" y1="575" x2="645" y2="575" stroke="#1a73e8" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr-blue)"/>
  <text x="650" y="579" font-size="10" fill="#333">Observability</text>
</svg>

</body>
</html>
