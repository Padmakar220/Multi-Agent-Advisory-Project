[pytest]
# Pytest configuration

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for test categorization
markers =
    unit: Unit tests
    property: Property-based tests
    integration: Integration tests
    performance: Performance tests
    slow: Slow-running tests
    aws: Tests requiring AWS services

# Coverage options
[coverage:run]
source = src,lambda
omit = 
    */tests/*
    */venv/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Hypothesis configuration
[hypothesis]
max_examples = 100
deadline = None
